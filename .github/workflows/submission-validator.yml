name: PR Submission Validator

on:
  pull_request_target:
    paths:
      - 'submissions/examples/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate Examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository (Target Branch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch and checkout PR Submissions
        run: |
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-branch
          git checkout pr-branch -- submissions/examples || true

      - name: Validate Submissions
        id: validate
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Get changed files in PR
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            // Identify unique folders modified under submissions/examples/
            const exampleFolders = new Set();
            for (const file of files) {
              if (file.filename.startsWith('submissions/examples/')) {
                const parts = file.filename.split('/');
                if (parts.length >= 3) {
                  exampleFolders.add(`${parts[0]}/${parts[1]}/${parts[2]}`);
                }
              }
            }

            if (exampleFolders.size === 0) {
              console.log('No files modified inside submissions/examples/ folders.');
              return;
            }

            // Required files and their purposes
            const requiredFiles = {
              'demo.html': 'Interactive demo showcasing your feature',
              'style.css': 'CSS styles for the demo',
              'README.md': 'Documentation and usage guide'
            };

            const failures = [];
            const successes = [];

            for (const folder of exampleFolders) {
              const missing = [];
              const present = [];
              
              for (const [reqFile, purpose] of Object.entries(requiredFiles)) {
                const filePath = path.join(process.env.GITHUB_WORKSPACE, folder, reqFile);
                if (!fs.existsSync(filePath)) {
                  missing.push({ file: reqFile, purpose });
                } else {
                  present.push({ file: reqFile, purpose });
                }
              }
              
              if (missing.length > 0) {
                failures.push({ folder, missing, present });
              } else {
                successes.push({ folder, present });
              }
            }

            // Store results for later steps
            core.setOutput('failures', JSON.stringify(failures));
            core.setOutput('successes', JSON.stringify(successes));
            core.setOutput('hasFailures', failures.length > 0);

            if (failures.length > 0) {
              console.log(`❌ Validation failed for ${failures.length} folder(s)`);
              core.setFailed('PR is missing required submission files.');
            } else {
              console.log(`✅ All ${successes.length} folder(s) validated successfully!`);
            }

      - name: Create/Update Failure Comment
        if: failure() && steps.validate.outputs.hasFailures == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const failures = JSON.parse(`${{ steps.validate.outputs.failures }}`);
            
            let commentBody = `## ❌ Submission Validation Failed\n\n`;
            commentBody += `Thank you for your contribution! However, some required files are missing.\n\n`;
            commentBody += `### 📋 Required Structure\n`;
            commentBody += `\`\`\`\n`;
            commentBody += `submissions/examples/your-feature-name/\n`;
            commentBody += `├── demo.html     ← Interactive demo (required)\n`;
            commentBody += `├── style.css     ← CSS styles (required)\n`;
            commentBody += `└── README.md     ← Documentation (required)\n`;
            commentBody += `\`\`\`\n\n`;
            commentBody += `### 🔍 Issues Found:\n\n`;
            
            for (const fail of failures) {
              commentBody += `#### 📁 Folder: \`${fail.folder}\`\n\n`;
              
              if (fail.missing.length > 0) {
                commentBody += `**Missing files:**\n`;
                for (const missing of fail.missing) {
                  commentBody += `- ❌ \`${missing.file}\` - ${missing.purpose}\n`;
                }
              }
              
              if (fail.present.length > 0) {
                commentBody += `\n**Present files:**\n`;
                for (const present of fail.present) {
                  commentBody += `- ✅ \`${present.file}\`\n`;
                }
              }
              commentBody += `\n---\n\n`;
            }
            
            commentBody += `### 📝 How to Fix:\n`;
            commentBody += `1. Add the missing files to your branch\n`;
            commentBody += `2. Push the changes to this PR\n`;
            commentBody += `3. The validator will automatically re-run\n\n`;
            commentBody += `📖 See [CONTRIBUTING.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CONTRIBUTING.md) for guidelines.\n`;
            
            // Find existing bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Submission Validation Failed')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
              console.log('✅ Updated existing failure comment.');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: commentBody
              });
              console.log('✅ Created new failure comment.');
            }

      - name: Create/Update Success Comment
        if: success() && steps.validate.outputs.hasFailures == 'false' && steps.validate.outputs.successes != '[]'
        uses: actions/github-script@v7
        with:
          script: |
            const successes = JSON.parse(`${{ steps.validate.outputs.successes }}`);
            
            let commentBody = `## ✅ Submission Validation Passed!\n\n`;
            commentBody += `Great job! All required files are present.\n\n`;
            
            for (const success of successes) {
              commentBody += `### 📁 Folder: \`${success.folder}\`\n`;
              commentBody += `**Files found:**\n`;
              for (const present of success.present) {
                commentBody += `- ✅ \`${present.file}\`\n`;
              }
              commentBody += `\n`;
            }
            
            commentBody += `### 🚀 Next Steps:\n`;
            commentBody += `- The maintainer will review your PR\n`;
            commentBody += `- Respond to any feedback if requested\n`;
            commentBody += `- Once approved, your contribution will be merged!\n\n`;
            commentBody += `Thank you for contributing to EaseMotion CSS! 🎉\n`;
            
            // Find existing bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              (comment.body.includes('Submission Validation Failed') || comment.body.includes('Submission Validation Passed'))
            );
            
            if (botComment && botComment.body.includes('Submission Validation Failed')) {
              // Update the old failure comment to show success
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
              console.log('✅ Updated existing failure comment to show success.');
            } else if (!botComment) {
              // Create new success comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: commentBody
              });
              console.log('✅ Created new success comment.');
            } else {
              console.log('Success comment already exists.');
            }

      - name: Add Label for Missing Files
        if: failure() && steps.validate.outputs.hasFailures == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: ['needs-files', 'invalid-submission']
              });
              console.log('✅ Added labels: needs-files, invalid-submission');
            } catch (error) {
              console.log('⚠️ Could not add labels:', error.message);
            }

      - name: Remove Labels on Success
        if: success() && steps.validate.outputs.hasFailures == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data: labels } = await github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
              });
              
              const labelsToRemove = ['needs-files', 'invalid-submission'];
              for (const label of labels) {
                if (labelsToRemove.includes(label.name)) {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.payload.pull_request.number,
                    name: label.name
                  });
                  console.log(`✅ Removed label: ${label.name}`);
                }
              }
            } catch (error) {
              console.log('⚠️ Could not remove labels:', error.message);
            }

      - name: Summary Output
        run: |
          echo "## Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.validate.outputs.hasFailures }}" == "true" ]; then
            echo "❌ **Status:** Validation Failed" >> $GITHUB_STEP_SUMMARY
            echo "Please check the comments above for details." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Status:** Validation Passed" >> $GITHUB_STEP_SUMMARY
            echo "All required files are present." >> $GITHUB_STEP_SUMMARY
          fi